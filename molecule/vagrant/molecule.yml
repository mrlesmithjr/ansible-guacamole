---
dependency:
  name: galaxy
  enabled: false
  options:
    role-file: requirements.yml
driver:
  name: vagrant
platforms:
  - name: ubuntu2004
    box: bento/ubuntu-20.04-arm64
    memory: 2048
    cpus: 2
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  playbooks:
    converge: ../shared/converge.yml
    prepare: ../shared/prepare.yml
    verify: ../shared/verify.yml
  config_options:
    defaults:
      remote_tmp: /tmp
verifier:
  name: ansible
